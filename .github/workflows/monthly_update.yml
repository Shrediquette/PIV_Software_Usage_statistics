name: Monthly Update

on:
  schedule:
    - cron: '0 6 1 * *'   # 1st of every month at 06:00 UTC
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PIV stats
        run: python piv_stats.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Publish report to docs/
        run: |
          mkdir -p docs
          cp output/piv_report.html docs/index.html
          cp output/piv_top10.png docs/piv_top10.png

      - name: Commit and push updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/piv_top10.png
          git diff --staged --quiet || git commit -m "Monthly update $(date +'%Y-%m')"
          git push
